name: dopamine-channel

# Автопостинг шок-фактов в облаке GitHub Actions.
# Работает даже при выключенном Mac. Время в cron — UTC (МСК = UTC+3).
on:
  schedule:
    - cron: "0 6 * * *"    # 09:00 МСК — утренний факт
    - cron: "0 10 * * *"   # 13:00 МСК — дневной
    - cron: "0 15 * * *"   # 18:00 МСК — вечерний (прайм-тайм)
    - cron: "0 18 * * *"   # 21:00 МСК — ночной
  workflow_dispatch:
    inputs:
      count:
        description: "Сколько постов опубликовать сейчас"
        default: "1"
        type: string

permissions:
  contents: write          # коммитим history.json обратно (антидубль)

concurrency:
  group: post
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Post fact
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          N: ${{ github.event.inputs.count || '1' }}
        run: python3 bot.py

      - name: Commit history (anti-duplicate)
        run: |
          git config user.name  "dopamine-bot"
          git config user.email "bot@users.noreply.github.com"
          git add history.json
          git diff --staged --quiet || git commit -m "history: update [skip ci]"
          git push
